<div class="schedule-form-container">
  <button class="primary-btn" (click)="showModal = true">
    <span class="material-icons-round">schedule</span>
    Schedule Session
  </button>

  <!-- Modal -->
  <div class="modal-overlay" *ngIf="showModal" (click)="showModal = false">
    <div class="modal-container" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>Schedule Study Session</h2>
        <button class="icon-btn" (click)="showModal = false">
          <span class="material-icons-round">close</span>
        </button>
      </div>
      
      <div class="modal-body">
        <div class="form-group">
          <label>Subject</label>
          <select [(ngModel)]="newSession.subjectId" required>
            <option value="">Select a subject</option>
            <option *ngFor="let subject of subjects" [value]="subject.id">{{ subject.name }}</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Duration (minutes)</label>
          <input type="number" [(ngModel)]="newSession.plannedDuration" min="15" max="300">
        </div>
        
        <div class="form-group">
          <label>Scheduled Date & Time</label>
          <input type="datetime-local" [(ngModel)]="newSession.scheduledDate" required>
        </div>
        
        <div class="form-group">
          <label>Notes (optional)</label>
          <textarea [(ngModel)]="newSession.notes" placeholder="Study goals, topics to cover..."></textarea>
        </div>

        <div class="form-group checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" [(ngModel)]="newSession.syncWithGoogle">
            <span class="custom-checkbox"></span>
            Sync with Google Calendar
          </label>
        </div>
      </div>

      <div class="modal-actions">
        <button class="secondary-btn" (click)="showModal = false">Cancel</button>
        <button class="primary-btn" (click)="scheduleSession()">Schedule Session</button>
      </div>
    </div>
  </div>
</div>
